<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Heart ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#ffb6c1,#ff6f91,#ff3d6e,#d61a5e);

    font-family:'Poppins',sans-serif;

    position:relative;
}

/* FONDO BRILLANTE */

body::before{
    content:"";
    position:absolute;

    width:800px;
    height:800px;

    background:rgba(255,255,255,0.15);

    border-radius:50%;

    filter:blur(100px);

    animation:flotar 6s infinite alternate;
}

/* ESTRELLAS */

.estrellas span{
    position:absolute;

    width:4px;
    height:4px;

    background:white;

    border-radius:50%;

    animation:brillar 3s infinite alternate;
}

/* CONTENEDOR */

.contenedor{
    position:relative;

    display:flex;
    flex-direction:column;
    align-items:center;

    z-index:2;
}

/* ARO */

.aro{
    position:absolute;

    width:340px;
    height:340px;

    border:2px solid rgba(255,255,255,0.3);

    border-radius:50%;

    animation:girar 15s linear infinite;
}

/* CORAZON */

.corazon{
    position:relative;

    width:180px;
    height:180px;

    background:#ff174f;

    transform:rotate(-45deg);

    animation:latido 1.4s infinite;

    box-shadow:
    0 0 30px #ff4f87,
    0 0 60px #ff4f87,
    0 0 100px rgba(255,255,255,0.7);
}

.corazon::before,
.corazon::after{

    content:"";

    position:absolute;

    width:180px;
    height:180px;

    background:#ff174f;

    border-radius:50%;
}

.corazon::before{
    top:-90px;
    left:0;
}

.corazon::after{
    left:90px;
    top:0;
}

/* BRILLO */

.brillo{
    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(255,255,255,0.7),
    transparent 70%);

    animation:pulse 2s infinite;
}

/* TEXTO */

.texto{

    margin-top:120px;

    text-align:center;
}

.texto h1{

    font-family:'Great Vibes',cursive;

    font-size:80px;

    color:white;

    text-shadow:
    0 0 10px white,
    0 0 20px #ff8fab,
    0 0 40px #ff4f87;

    animation:brilloTexto 2s infinite alternate;
}

.texto p{

    margin-top:10px;

    color:white;

    font-size:20px;

    letter-spacing:2px;

    opacity:0.9;
}

/* BOTONES */

.botones{

    margin-top:40px;

    display:flex;
    gap:25px;
}

.botones a{

    position:relative;

    overflow:hidden;

    text-decoration:none;

    padding:15px 35px;

    border-radius:50px;

    background:
    rgba(255,255,255,0.15);

    backdrop-filter:blur(10px);

    color:white;

    font-size:18px;
    font-weight:bold;

    border:1px solid rgba(255,255,255,0.3);

    transition:0.5s;

    box-shadow:
    0 0 20px rgba(255,255,255,0.2);
}

/* EFECTO BOTON */

.botones a::before{

    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
    );

    transition:0.5s;
}

.botones a:hover::before{
    left:100%;
}

.botones a:hover{

    transform:
    translateY(-5px)
    scale(1.08);

    background:white;

    color:#ff2d55;

    box-shadow:
    0 0 30px white,
    0 0 50px #ff4f87;
}

/* PARTICULAS */

.particula{
    position:absolute;

    font-size:25px;

    animation:subir 8s linear infinite;

    opacity:0.8;
}

/* ANIMACIONES */

@keyframes latido{

    0%{
        transform:rotate(-45deg) scale(1);
    }

    25%{
        transform:rotate(-45deg) scale(1.08);
    }

    50%{
        transform:rotate(-45deg) scale(1);
    }

    75%{
        transform:rotate(-45deg) scale(1.15);
    }

    100%{
        transform:rotate(-45deg) scale(1);
    }
}

@keyframes brilloTexto{

    from{
        opacity:0.8;
    }

    to{
        opacity:1;

        text-shadow:
        0 0 15px white,
        0 0 30px #ff8fab,
        0 0 60px #ff4f87;
    }
}

@keyframes subir{

    0%{
        transform:
        translateY(100vh)
        scale(0.5);

        opacity:0;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:
        translateY(-120vh)
        scale(1.5);

        opacity:0;
    }
}

@keyframes brillar{

    from{
        opacity:0.2;
    }

    to{
        opacity:1;
    }
}

@keyframes pulse{

    0%{
        transform:scale(1);
        opacity:0.5;
    }

    50%{
        transform:scale(1.2);
        opacity:0.8;
    }

    100%{
        transform:scale(1);
        opacity:0.5;
    }
}

@keyframes flotar{

    from{
        transform:translateY(-20px);
    }

    to{
        transform:translateY(20px);
    }
}

@keyframes girar{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* RESPONSIVE */

@media(max-width:768px){

    .texto h1{
        font-size:55px;
    }

    .texto p{
        font-size:16px;
    }

    .corazon{
        width:130px;
        height:130px;
    }

    .corazon::before,
    .corazon::after{
        width:130px;
        height:130px;
    }

    .corazon::before{
        top:-65px;
    }

    .corazon::after{
        left:65px;
    }

    .aro{
        width:250px;
        height:250px;
    }

}

</style>
</head>

<body>

<!-- ESTRELLAS -->

<div class="estrellas">

<span style="top:10%; left:20%;"></span>
<span style="top:30%; left:70%;"></span>
<span style="top:70%; left:40%;"></span>
<span style="top:50%; left:90%;"></span>
<span style="top:15%; left:55%;"></span>
<span style="top:80%; left:15%;"></span>

</div>

<!-- CONTENIDO -->

<div class="contenedor">

<div class="aro"></div>

<div class="brillo"></div>

<div class="corazon"></div>

<div class="texto">

<h1>Te Amo ❤️</h1>

<p>
Eres mi lugar favorito en todo el universo ✨
</p>

</div>

<!-- BOTONES -->

<div class="botones">

<a href="carta.html">
💌 Carta
</a>

</div>

</div>

<!-- PARTICULAS -->

<div class="particula" style="left:5%; animation-delay:0s;">❤️</div>
<div class="particula" style="left:15%; animation-delay:2s;">💕</div>
<div class="particula" style="left:25%; animation-delay:4s;">💖</div>
<div class="particula" style="left:35%; animation-delay:1s;">💘</div>
<div class="particula" style="left:45%; animation-delay:3s;">💞</div>
<div class="particula" style="left:55%; animation-delay:5s;">❤️</div>
<div class="particula" style="left:65%; animation-delay:2s;">💕</div>
<div class="particula" style="left:75%; animation-delay:4s;">💖</div>
<div class="particula" style="left:85%; animation-delay:1s;">💘</div>
<div class="particula" style="left:95%; animation-delay:3s;">💞</div>

</body>
</html>
